<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TripSync — Sin conexión</title>
  <style>
    :root {
      --bg: #0E1926;
      --ink: #F0F3F2;
      --muted: #8FA0A8;
      --accent-teal: #3FA0AA;
      --accent-teal-soft: rgba(63,160,170,0.16);
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #EEF2F3; --ink: #16263B; --muted: #5B6B75; --accent-teal: #1F6F78; --accent-teal-soft: rgba(31,111,120,0.10); }
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0;
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .wrap { text-align: center; max-width: 320px; }
    .mark {
      width: 76px; height: 76px; margin: 0 auto 20px;
    }
    h1 { font-size: 1.3rem; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 0.92rem; line-height: 1.5; margin: 0 0 22px; }
    button {
      background: var(--accent-teal); color: #fff; border: none;
      padding: 12px 22px; border-radius: 999px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="36" fill="none" stroke="var(--accent-teal)" stroke-width="2" stroke-dasharray="6 6"/>
      <path d="M30 62 L78 24 L50 42 L44 70 L38 56 Z" fill="var(--ink)" opacity="0.85"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>No hay internet en este momento. Conéctate para ver los últimos cambios del itinerario — mientras tanto, tu app seguirá abriendo con lo último que se guardó.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
